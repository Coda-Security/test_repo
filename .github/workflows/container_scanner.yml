name: Container Image Scanner

on:
  pull_request:
    paths:
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '**/*.Dockerfile'
      - '**/Dockerfile-*'
      - '**/*.dockerfile'
      - '**/Containerfile'
      - '**/Containerfile.*'
      - '**/*.Containerfile'
      - '**/Containerfile-*'
      - '**/*.containerfile'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      dockerfiles: ${{ steps.find.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0                      # needed for the PR base...head diff
      - id: find
        env:
          EVENT:   ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          shopt -s nocasematch          # so Dockerfile/dockerfile/DOCKERFILE all match

          # Conventional name → trust it, no content read.
          looks_like_dockerfile_name() {
            case "$(basename "$1")" in
              Dockerfile|Dockerfile.*|*.Dockerfile|Dockerfile-*|\
              Containerfile|Containerfile.*|*.Containerfile|Containerfile-*) return 0 ;;
            esac
            return 1
          }

          # Arbitrary name → sniff content. First real instruction must be FROM,
          # plus a second directive so a file that merely starts with FROM is not a hit.
          is_dockerfile_content() {
            local f="$1"
            grep -Iq . "$f" || return 1               # skip binary/empty cheaply
            awk '
              /^[[:space:]]*$/ { next }
              /^[[:space:]]*#/ { next }
              /^[[:space:]]*[Aa][Rr][Gg][[:space:]]/ { next }
              { exit ($0 ~ /^[[:space:]]*[Ff][Rr][Oo][Mm][[:space:]]+[^[:space:]]/) ? 0 : 1 }
              END { exit 1 }
            ' "$f" || return 1
            grep -IqiE '^[[:space:]]*(RUN|COPY|ADD|CMD|ENTRYPOINT|ENV|EXPOSE|WORKDIR|VOLUME|LABEL|USER|ONBUILD|STOPSIGNAL|HEALTHCHECK|SHELL)([[:space:]]|$)' "$f"
          }

          is_candidate() {
            local f="$1"
            [ -f "$f" ] || return 1                    # also drops deletions in a diff
            looks_like_dockerfile_name "$f" && return 0
            is_dockerfile_content "$f"
          }

          declare -a files=()
          if [ "$EVENT" = "pull_request" ]; then
            # diff is small → content-check every changed file (catches odd names too)
            while IFS= read -r f; do
              is_candidate "$f" && files+=("$f")
            done < <(git diff --name-only "$PR_BASE...$PR_HEAD")
          fi

          if [ "${#files[@]}" -eq 0 ]; then
            echo "dockerfiles=[]" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${files[@]}" \
              | jq -R '{path: ., slug: (ascii_downcase | gsub("[/.]";"-"))}' | jq -cs .)
            echo "dockerfiles=$json" >> "$GITHUB_OUTPUT"
          fi
          echo "Discovered: $(cat "$GITHUB_OUTPUT")"

  scan:
    needs: discover
    if: needs.discover.outputs.dockerfiles != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.discover.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build an image from Dockerfile
        env:
          DF: ${{ matrix.image.path }}
        run: |
          set -euo pipefail
          ctx="$(dirname "$DF")"              # ASSUMPTION: context = Dockerfile's dir
          docker build -f "$DF" \
            -t "container-image:${{ matrix.image.slug }}-${{ github.sha }}" \
            "$ctx"

      - name: Run scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 #v0.36.0
        with:
          scan-type: image
          image-ref: 'container-image:${{ matrix.image.slug }}-${{ github.sha }}'
          format: sarif
          output: container-image-results.sarif
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln'
          limit-severities-for-sarif: 'true'

      - name: Summarise findings in the run log
        if: always()
        run: |
          echo "### ${{ matrix.image.path }}" | tee -a "$GITHUB_STEP_SUMMARY"
          if [ -s container-image-results.sarif ] && jq -e . container-image-results.sarif >/dev/null 2>&1; then
            count=$(jq '[.runs[].results[]] | length' container-image-results.sarif)
            if [ "$count" -eq 0 ]; then
              echo "✅ No findings (CRITICAL/HIGH/MEDIUM)." | tee -a "$GITHUB_STEP_SUMMARY"
            else
              echo "Container image scanner reported ${count} finding(s):" | tee -a "$GITHUB_STEP_SUMMARY"
              jq -r '.runs[].results[] | "- " + (.ruleId // "?") + ": " + (.message.text // "")' \
                container-image-results.sarif | head -40 | tee -a "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "⚠️ No parseable SARIF — scan likely failed. **Not a clean result.** Check the scan log." \
              | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      # - name: Container image scan gateway (block on CRITICAL only)
      #   uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 #v0.36.0
      #   with:
      #     scan-type: image
      #     image-ref: 'container-image:${{ matrix.image.slug }}-${{ github.sha }}'
      #     format: table
      #     exit-code: '1'
      #     ignore-unfixed: true
      #     vuln-type: 'os,library'
      #     severity: 'CRITICAL'
      #     scanners: 'vuln'

      - name: Upload results as a downloadable artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   #v7.0.1
        with:
          name: container-image-scan-results-${{ matrix.image.slug }}
          path: container-image-results.sarif
