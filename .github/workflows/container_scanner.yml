# This is a basic workflow to help you get started with Actions

name: Container Image Scanner

# Controls when the workflow will run
on:
  push:
    branches: [main]      # post-merge baseline; also what populates the Security tab
  release:
    types: [published]    # hard gate before the image ships to ECR/GCR
    
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build an image from Dockerfile
        run: docker build -t container-image:${{ github.sha }} .
      - name: Trivy scan reporting
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 #v0.36.0
        with:
          scan-type: image
          image-ref: 'container-image:${{ github.sha }}'
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln'
          limit-severities-for-sarif: 'true'
      - name: Summarise findings in the run log
        if: always()
        run: |
          if [ -f trivy-results.sarif ]; then
            count=$(jq '[.runs[].results[]] | length' trivy-results.sarif 2>/dev/null || echo 0)
            echo "Trivy reported the following ${count} findings for the container image" \
              | tee -a "$GITHUB_STEP_SUMMARY"
            jq -r '.runs[].results[] | "- " + (.ruleId // "?") + ": " + (.message.text // "")' \
              trivy-results.sarif 2>/dev/null | head -40 | tee -a "$GITHUB_STEP_SUMMARY" || true
          else
            echo "No SARIF produced — the scan step likely failed; check its log." \
              | tee -a "$GITHUB_STEP_SUMMARY"
          fi
      - name: Trivy scan gateway (block on CRITICAL only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 #v0.36.0
        with:
          scan-type: image
          image-ref: 'container-image:${{ github.sha }}'
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'
          scanners: 'vuln'
      - name: Upload results as a downloadable artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   #v7.0.1
        with:
          name: container-image-scan-results
          path: trivy-results.sarif
          
