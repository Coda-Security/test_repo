name: Container Image Scanner

on:
  pull_request:
    paths:
      - '**/Dockerfile'
      - '**/Containerfile'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      dockerfiles: ${{ steps.find.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0                      # needed for the push diff
      - id: find
        env:
          EVENT:  ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA:    ${{ github.sha }}
        run: |
          set -euo pipefail
          declare -a files=()
          if [ "$EVENT" = "push" ] && [ -n "${BEFORE:-}" ] \
             && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            # changed Dockerfiles in this push (skip deletions via -f test)
            while IFS= read -r f; do
              case "$(basename "$f")" in
                Dockerfile|Containerfile) [ -f "$f" ] && files+=("$f") ;;
              esac
            done < <(git diff --name-only "$BEFORE" "$SHA")
          else
            # release / workflow_dispatch / first-push: scan the whole repo
            while IFS= read -r f; do files+=("${f#./}"); done \
              < <(find . -type f \( -name Dockerfile -o -name Containerfile \) -not -path './.git/*')
          fi
          if [ "${#files[@]}" -eq 0 ]; then
            echo "dockerfiles=[]" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${files[@]}" \
              | jq -R '{path: ., slug: (ascii_downcase | gsub("[/.]";"-"))}' | jq -cs .)
            echo "dockerfiles=$json" >> "$GITHUB_OUTPUT"
          fi
          echo "Discovered: $(cat "$GITHUB_OUTPUT")"

  scan:
    needs: discover
    if: needs.discover.outputs.dockerfiles != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false        # one bad image must not cancel the others
      matrix:
        image: ${{ fromJSON(needs.discover.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build an image from Dockerfile
        env:
          DF: ${{ matrix.image.path }}
        run: |
          set -euo pipefail
          ctx="$(dirname "$DF")"              # ASSUMPTION: context = Dockerfile's dir (see note)
          docker build -f "$DF" \
            -t "container-image:${{ matrix.image.slug }}-${{ github.sha }}" \
            "$ctx"

      - name: Run scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 #v0.36.0
        with:
          scan-type: image
          image-ref: 'container-image:${{ matrix.image.slug }}-${{ github.sha }}'
          format: sarif
          output: container-image-results.sarif
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln'
          limit-severities-for-sarif: 'true'

      - name: Summarise findings in the run log
        if: always()
        run: |
          echo "### ${{ matrix.image.path }}" | tee -a "$GITHUB_STEP_SUMMARY"
          if [ -s container-image-results.sarif ] && jq -e . container-image-results.sarif >/dev/null 2>&1; then
            count=$(jq '[.runs[].results[]] | length' container-image-results.sarif)
            if [ "$count" -eq 0 ]; then
              echo "✅ No findings (CRITICAL/HIGH/MEDIUM)." | tee -a "$GITHUB_STEP_SUMMARY"
            else
              echo "Container image scanner reported ${count} finding(s):" | tee -a "$GITHUB_STEP_SUMMARY"
              jq -r '.runs[].results[] | "- " + (.ruleId // "?") + ": " + (.message.text // "")' \
                container-image-results.sarif | head -40 | tee -a "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "⚠️ No parseable SARIF — scan likely failed. **Not a clean result.** Check the scan log." \
              | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      # - name: Container image scan gateway (block on CRITICAL only)
      #   uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 #v0.36.0
      #   with:
      #     scan-type: image
      #     image-ref: 'container-image:${{ matrix.image.slug }}-${{ github.sha }}'
      #     format: table
      #     exit-code: '1'              # CHANGED from '0' — see note below
      #     ignore-unfixed: true
      #     vuln-type: 'os,library'
      #     severity: 'CRITICAL'
      #     scanners: 'vuln'

      - name: Upload results as a downloadable artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   #v7.0.1
        with:
          name: container-image-scan-results-${{ matrix.image.slug }}   # must be unique per matrix leg
          path: container-image-results.sarif
