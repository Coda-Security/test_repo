name: Container Image Scanner

on:
  push:
    branches: [main, master]
    paths:
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '**/*.Dockerfile'
      - '**/Dockerfile-*'
      - '**/*.dockerfile'
    
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      dockerfiles: ${{ steps.find.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          fetch-depth: 0                      # needed for the PR base...head diff
      - id: find
        env:
          BEFORE: ${{ github.event.before }}
          SHA:    ${{ github.sha }}
        run: |
          set -euo pipefail
          shopt -s nocasematch

          is_dockerfile() {
            local f="$1"
            [ -f "$f" ] || return 1                    # drops deletions in the diff
            case "$(basename "$f")" in
              Containerfile|Containerfile.*|*.Containerfile|Containerfile-*) return 1 ;;
              Dockerfile|Dockerfile.*|*.Dockerfile|Dockerfile-*) return 0 ;;
            esac
            return 1
          }

          declare -a files=()
          if [ -n "${BEFORE:-}" ] \
             && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            while IFS= read -r f; do
              is_dockerfile "$f" && files+=("$f")
            done < <(git diff --name-only "$BEFORE" "$SHA")
          else
            while IFS= read -r f; do
              f="${f#./}"
              is_dockerfile "$f" && files+=("$f")
            done < <(find . -type f \
                       \( -iname 'Dockerfile' -o -iname 'Dockerfile.*' -o -iname '*.Dockerfile' -o -iname 'Dockerfile-*' \) \
                       -not -path './.git/*' -not -path '*/node_modules/*')
          fi

          if [ "${#files[@]}" -eq 0 ]; then
            echo "dockerfiles=[]" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${files[@]}" \
              | jq -R '{path: ., slug: (ascii_downcase | gsub("[/.]";"-"))}' | jq -cs .)
            echo "dockerfiles=$json" >> "$GITHUB_OUTPUT"
          fi
          echo "Discovered: $(cat "$GITHUB_OUTPUT")"

  scan:
    needs: discover
    if: needs.discover.outputs.dockerfiles != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.discover.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Build an image from Dockerfile
        env:
          DF: ${{ matrix.image.path }}
        run: |
          set -euo pipefail
          ctx="$(dirname "$DF")"              # ASSUMPTION: context = Dockerfile's dir
          docker build -f "$DF" \
            -t "container-image:${{ matrix.image.slug }}-${{ github.sha }}" \
            "$ctx"

      - name: Manual Trivy Setup
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 #v0.3.1
        with:
          cache: true
          version: v0.71.2
          
      - name: Run scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 #v0.36.0
        with:
          scan-type: image
          image-ref: 'container-image:${{ matrix.image.slug }}-${{ github.sha }}'
          format: text
          hide-progress: true
          output: trivy.txt
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln'
          limit-severities-for-sarif: 'true'
          skip-setup-trivy: true

      - name: Summarise findings in the run log
        run: |
          if [[ -s trivy.txt ]]; then
            {
              echo "### Security Output"
              echo "<details><summary>Click to expand</summary>"
              echo ""
              echo '```terraform'
              cat trivy.txt
              echo '```'
              echo "</details>"
            } >> $GITHUB_STEP_SUMMARY
          fi

      # - name: Container image scan gateway (block on CRITICAL only)
      #   uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 #v0.36.0
      #   with:
      #     scan-type: image
      #     image-ref: 'container-image:${{ matrix.image.slug }}-${{ github.sha }}'
      #     format: table
      #     exit-code: '1'
      #     ignore-unfixed: true
      #     vuln-type: 'os,library'
      #     severity: 'CRITICAL'
      #     scanners: 'vuln'

      - name: Upload results as a downloadable artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   #v7.0.1
        with:
          name: container-image-scan-results-${{ matrix.image.slug }}
          path: trivy.txt
