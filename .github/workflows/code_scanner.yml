name: SAST Scanner

on:
  pull_request:

permissions:
  contents: read
  security-events: write        # required to upload SARIF to code scanning

jobs:
  sast-scanner:
    runs-on: ubuntu-latest       # see note on self-hosted below
    env:
      IMAGE: public.ecr.aws/x1b3t1s7/coda-security/sast-scanner:latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0                       # needed for --baseline-commit on PRs

      - name: Run scan
        env:
          BASELINE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
        run: |
          docker pull "$IMAGE"
          BASE_ARG=""
          [ -n "$BASELINE" ] && BASE_ARG="--baseline-commit $BASELINE"
          # No --error: we want a clean exit + a SARIF we control the gating on.
          docker run --rm --network none \
            --user "$(id -u):$(id -g)" -e HOME=/tmp \
            -v "$GITHUB_WORKSPACE":/src -w /src \
            "$IMAGE" scan \
              --config /opt/scanner-rules \
              --sarif --output /src/results.sarif \
              $BASE_ARG /src
          test -s results.sarif || { echo "No SARIF produced"; exit 1; }

          # keeps tool.driver.name/version (spec-valid), drops the bulky rules metadata
          jq 'del(.runs[].tool.driver.rules)'
          
          # Normalize container paths so annotations attach to repo-relative files
          jq '(.runs[].results[].locations[].physicalLocation.artifactLocation.uri)
                |= (sub("^file://";"") | sub("^/src/";"") | sub("^src/";""))' \
             results.sarif > results.norm.sarif && mv results.norm.sarif results.sarif

      - name: Upload results as a downloadable artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   #v7.0.1
        with:
          name: sast-scan-results
          path: results.sarif
          
      - name: Annotate code lines
        run: |
          jq -r '
            def enc:     gsub("%";"%25") | gsub("\r";"%0D") | gsub("\n";"%0A");
            def encprop: enc | gsub(":";"%3A") | gsub(",";"%2C");
            def ghtype($l): if $l=="error" then "error" elif $l=="note" then "notice" else "warning" end;
            def sev($l):    if $l=="error" then "HIGH"  elif $l=="note" then "LOW"    else "MEDIUM" end;
            .runs[].results[] as $r
            | ($r.level // "warning") as $lvl
            | $r.locations[0].physicalLocation as $p
            | "::\(ghtype($lvl)) "
              + "file=\($p.artifactLocation.uri|encprop),"
              + "line=\($p.region.startLine // 1),"
              + "endLine=\($p.region.endLine // ($p.region.startLine // 1)),"
              + "col=\($p.region.startColumn // 1),"
              + "title=[\(sev($lvl))] \($r.ruleId|encprop)"
              + "::\($r.message.text|enc)"
          ' results.sarif

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## SAST Scan Results"
            echo ""
            echo "| Severity | Rule | Location | Message |"
            echo "|---|---|---|---|"
            jq -r '
              def sev($l): if $l=="error" then "HIGH" elif $l=="note" then "LOW" else "MEDIUM" end;
              .runs[].results[]
              | ((.level // "warning")) as $lvl
              | "| \(sev($lvl)) "
                + "| `\(.ruleId)` "
                + "| `\(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine // 1)` "
                + "| \((.message.text)|gsub("\n";" ")|gsub("\\|";"\\\\|")) |"
            ' results.sarif
          } >> "$GITHUB_STEP_SUMMARY"
      # - name: Gate PR on findings
      #   run: |
      #     if [ -n "$BLOCK_LEVELS" ]; then
      #       FILTER='select((.level // "warning") as $l | ("'"$BLOCK_LEVELS"'" | split(",")) | index($l))'
      #     else
      #       FILTER='.'
      #     fi
