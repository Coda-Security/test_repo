name: SAST Scanner

on:
  pull_request:
  push:
    branches: [main,master]

permissions:
  contents: read
  security-events: write        # required to upload SARIF to code scanning

jobs:
  sast-scanner:
    runs-on: ubuntu-latest       # see note on self-hosted below
    env:
      IMAGE: public.ecr.aws/x1b3t1s7/coda-security/sast-scanner:latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0                       # needed for --baseline-commit on PRs

      - name: Run Scan
        env:
          BASELINE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
        run: |
          docker pull "$IMAGE"
          BASE_ARG=""
          [ -n "$BASELINE" ] && BASE_ARG="--baseline-commit $BASELINE"
          docker run --rm \
            --network none \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$GITHUB_WORKSPACE":/src -w /src \
            "$IMAGE" scan \
              --error \
              --sarif --output /src/results.sarif \
              $BASE_ARG \
              /src
          test -s results.sarif || { echo "No SARIF produced"; exit 1; }
          
      # upload the results for the CodeQL GitHub app to annotate the code
      - name: Save SARIF results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   #v7.0.1
        with:
          name: sast-scan-results
          path: /src/results.sarif
